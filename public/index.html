<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Cell Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="36" height="36" rx="8" stroke="currentColor" stroke-width="2"/>
            <circle cx="20" cy="18" r="6" stroke="currentColor" stroke-width="2"/>
            <path d="M8 30c2.5-5 7-8 12-8s9.5 3 12 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="20" cy="18" r="2" fill="currentColor"/>
          </svg>
        </div>
        <h1>Vision Cell Builder</h1>
        <p class="login-sub">Internal tool for vision-guided robotic work cell builds</p>
      </div>
      <form id="login-form" class="login-form" autocomplete="on">
        <label class="field">
          <span>Username</span>
          <input type="text" name="username" id="login-username" required autofocus placeholder="admin" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" id="login-password" required placeholder="••••••••" />
        </label>
        <p id="login-error" class="form-error hidden" role="alert"></p>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign in</button>
      </form>
      <div class="login-hint">
        <strong>Demo accounts</strong>
        <code>admin / admin123</code>
        <code>engineer / engineer123</code>
        <code>viewer / viewer123</code>
      </div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app-shell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-mark sm" aria-hidden="true">
          <svg viewBox="0 0 40 40" fill="none"><rect x="2" y="2" width="36" height="36" rx="8" stroke="currentColor" stroke-width="2"/><circle cx="20" cy="18" r="6" stroke="currentColor" stroke-width="2"/><path d="M8 30c2.5-5 7-8 12-8s9.5 3 12 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="18" r="2" fill="currentColor"/></svg>
        </div>
        <div>
          <div class="brand-title">Vision Cell</div>
          <div class="brand-sub">Builder</div>
        </div>
      </div>
      <nav class="nav" id="main-nav">
        <button type="button" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">◈</span> Dashboard
        </button>
        <button type="button" class="nav-item" data-view="cells">
          <span class="nav-icon">▣</span> Work Cells
        </button>
        <button type="button" class="nav-item" data-view="inventory">
          <span class="nav-icon">▤</span> Inventory
        </button>
        <button type="button" class="nav-item" data-view="network">
          <span class="nav-icon">⬡</span> Network
        </button>
        <button type="button" class="nav-item" data-view="software">
          <span class="nav-icon">◈</span> Software
        </button>
        <button type="button" class="nav-item" data-view="kpis">
          <span class="nav-icon">◎</span> KPI Goals
        </button>
        <button type="button" class="nav-item" data-view="account" id="nav-account">
          <span class="nav-icon">◉</span> Account
        </button>
        <button type="button" class="nav-item hidden" data-view="users" id="nav-users">
          <span class="nav-icon">◎</span> Users
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="user-chip">
          <div class="user-avatar" id="user-avatar">A</div>
          <div>
            <div class="user-name" id="user-name">—</div>
            <div class="user-role" id="user-role">—</div>
          </div>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="view-title">Dashboard</h2>
          <p class="view-desc" id="view-desc">Overview of cell builds and targets</p>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-root" class="modal-root hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal" id="modal">
      <header class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button type="button" class="btn-icon" id="modal-close" aria-label="Close">×</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
      <footer class="modal-footer" id="modal-footer"></footer>
    </div>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
