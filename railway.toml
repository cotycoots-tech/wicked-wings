# Railway config — forces the stdlib Python server (not Node via package.json)
# Docs: https://docs.railway.com/config-as-code/reference

[build]
builder = "RAILPACK"

[deploy]
startCommand = "python server/app.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
